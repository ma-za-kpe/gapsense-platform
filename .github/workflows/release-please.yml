name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release pull request
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      pr-branch: ${{ steps.release.outputs.pr != '' && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
      prs-created: ${{ steps.release.outputs.prs_created }}

    steps:
      - name: Create or update the release pull request
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dispatch-release-ci:
    name: Validate bot-created release pull request
    needs:
      - release-please
    if: needs.release-please.outputs.prs-created == 'true' && needs.release-please.outputs.pr-branch != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch the required CI gate on the release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ needs.release-please.outputs.pr-branch }}
        run: gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$RELEASE_BRANCH"
