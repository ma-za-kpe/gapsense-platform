name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  validation:
    name: Required
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GAPSENSE_DATA_HOST_PATH: ./fixtures/public-data
      GAPSENSE_PR_TITLE: ${{ github.event.pull_request.title || '' }}

    steps:
      - name: Check out the candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select the smallest safe validation path
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mode="full"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            mode="docs"
            while IFS= read -r path; do
              case "$path" in
                *.md|docs/*|.github/ISSUE_TEMPLATE/*)
                  ;;
                *)
                  mode="full"
                  break
                  ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Run the repository-owned Docker gate
        shell: bash
        env:
          CI_MODE: ${{ steps.scope.outputs.mode }}
        run: bash scripts/ci.sh "$CI_MODE"

      - name: Remove ephemeral CI resources
        if: always()
        shell: bash
        run: docker compose --profile test down --volumes --remove-orphans
