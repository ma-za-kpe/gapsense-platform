# ============================================================================
# GapSense Docker Compose — Local Development
# Usage: docker compose up -d
# ============================================================================

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gapsense
      POSTGRES_USER: gapsense
      POSTGRES_PASSWORD: localdev # pragma: allowlist secret -- local-only disposable credential
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapsense"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # --- GapSense Web API ---
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: uvicorn gapsense.main:app --host 0.0.0.0 --port 8000 --reload
    init: true
    environment:
      - DATABASE_URL=postgresql+asyncpg://gapsense:localdev@db:5432/gapsense # pragma: allowlist secret -- local-only disposable credential
      - ENVIRONMENT=local
      - LOG_LEVEL=DEBUG
      - GAPSENSE_DATA_PATH=/app/data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ${GAPSENSE_DATA_HOST_PATH:-../gapsense-data}:/app/data:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/v1/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # --- GapSense Web Interface ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    init: true
    environment:
      - API_PROXY_TARGET=http://web:8000
      - VITE_OUT_DIR=/tmp/gapsense-dist
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # --- Immutable Frontend Smoke Target ---
  frontend-production:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      web:
        condition: service_healthy

  # --- Isolated Development Browser Target ---
  frontend-validation:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    init: true
    environment:
      - API_PROXY_TARGET=http://web:8000
      - VITE_OUT_DIR=/tmp/gapsense-dist
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # --- Repeatable Browser Validation ---
  browser-tests:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: browser-tests
    environment:
      - FRONTEND_URL=http://localhost:3000
    network_mode: "service:frontend-validation"
    read_only: true
    tmpfs:
      - /tmp
      - /dev/shm:size=1g
    security_opt:
      - no-new-privileges:true
    depends_on:
      frontend-validation:
        condition: service_healthy

  # --- Immutable Production Browser Validation ---
  browser-production-tests:
    profiles: ["test"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: browser-tests
    environment:
      - EXPECT_IMMUTABLE_ASSETS=1
      - FRONTEND_URL=http://localhost:8080
    network_mode: "service:frontend-production"
    read_only: true
    tmpfs:
      - /tmp
      - /dev/shm:size=1g
    security_opt:
      - no-new-privileges:true
    depends_on:
      frontend-production:
        condition: service_healthy

  # --- GapSense Worker ---
  worker:
    profiles: ["whatsapp"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: python -m gapsense.worker.main
    init: true
    environment:
      - DATABASE_URL=postgresql+asyncpg://gapsense:localdev@db:5432/gapsense # pragma: allowlist secret -- local-only disposable credential
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - AWS_REGION=af-south-1
      - ENVIRONMENT=local
      - LOG_LEVEL=DEBUG
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/gapsense-messages
      - GAPSENSE_DATA_PATH=/app/data
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
      - ./src:/app/src:ro
      - ${GAPSENSE_DATA_HOST_PATH:-../gapsense-data}:/app/data:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # --- LocalStack (SQS + S3 for local dev) ---
  localstack:
    profiles: ["whatsapp"]
    image: localstack/localstack:3.0
    environment:
      - SERVICES=sqs,s3
      - DEFAULT_REGION=af-south-1
    ports:
      - "127.0.0.1:4566:4566"
    volumes:
      - ./infrastructure/gapsense_localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
