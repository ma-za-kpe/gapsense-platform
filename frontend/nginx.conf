server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self' __GAPSENSE_SEARCH_SCRIPT_SOURCE__; style-src 'self'" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    location /api/ {
        proxy_pass http://web:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
    }

    location = /api/v1/analytics/events {
        client_max_body_size 4k;
        proxy_pass http://web:8000/v1/analytics/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Server;
    }

    location = /robots.txt {
        try_files $uri =404;
        add_header_inherit merge;
        add_header Cache-Control "no-store" always;
    }

    location = /sitemap.xml {
        try_files $uri @missing_sitemap;
        add_header_inherit merge;
        add_header Cache-Control "no-store" always;
    }

    location @missing_sitemap {
        types { }
        default_type text/plain;
        add_header_inherit merge;
        add_header Cache-Control "no-store" always;
        return 404 "Not found\n";
    }

    location /assets/ {
        try_files $uri =404;
        add_header_inherit merge;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
